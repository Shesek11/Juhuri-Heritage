<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Traditional Caucasian / Juhuri geometric carpet motif -->
  <g fill="none" stroke="#f59e0b" stroke-width="1.5">
    <!-- Center Stepped Medallion (Göl) -->
    <path d="M50 15 L55 15 L55 25 L65 25 L65 35 L75 35 L75 65 L65 65 L65 75 L55 75 L55 85 L45 85 L45 75 L35 75 L35 65 L25 65 L25 35 L35 35 L35 25 L45 25 L45 15 Z" />
    <!-- Inner Diamond -->
    <path d="M50 30 L65 50 L50 70 L35 50 Z" />
    <!-- Inner Core -->
    <path d="M50 45 L55 50 L50 55 L45 50 Z" fill="#f59e0b" />
    <!-- Corner connection lines -->
    <path d="M0 0 L20 20 M100 0 L80 20 M0 100 L20 80 M100 100 L80 80" stroke-width="1"/>
    <!-- Quarter stars in the corners for tile edge meeting -->
    <path d="M0 25 L10 25 L10 10 L25 10 L25 0 M100 25 L90 25 L90 10 L75 10 L75 0 M0 75 L10 75 L10 90 L25 90 L25 100 M100 75 L90 75 L90 90 L75 90 L75 100" stroke-width="1"/>
  </g>
</svg>
